<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:Poppins,sans-serif;

background:#050816;

overflow-x:hidden;

color:white;

}

/* Animated Gradient */

body::before{

content:"";

position:fixed;

width:100%;

height:100%;

left:0;
top:0;

background:

radial-gradient(circle at 20% 20%,#9c27ff55,transparent 30%),

radial-gradient(circle at 80% 30%,#00d4ff33,transparent 30%),

radial-gradient(circle at 50% 80%,#ff4ecd44,transparent 30%),

#050816;

animation:bgMove 15s linear infinite;

z-index:-2;

}

@keyframes bgMove{

0%{

transform:scale(1) rotate(0deg);

}

50%{

transform:scale(1.1) rotate(5deg);

}

100%{

transform:scale(1) rotate(0deg);

}

}

/* Stars */

.stars{

position:fixed;

width:100%;

height:100%;

overflow:hidden;

z-index:-1;

}

.star{

position:absolute;

width:2px;

height:2px;

background:white;

border-radius:50%;

animation:twinkle 3s infinite ease-in-out;

}

@keyframes twinkle{

0%,100%{

opacity:.2;

transform:scale(1);

}

50%{

opacity:1;

transform:scale(2);

}

}

/* Hero */

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}

.glass{

backdrop-filter:blur(18px);

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

border-radius:30px;

padding:50px;

max-width:800px;

box-shadow:0 20px 60px rgba(0,0,0,.4);

}

.hero h2{

font-size:22px;

font-weight:300;

color:#ddd;

margin-bottom:10px;

}

.hero h1{

font-size:72px;

font-family:'Great Vibes',cursive;

color:#ff80df;

margin-bottom:20px;

}

.hero p{

font-size:20px;

line-height:1.8;

color:#ddd;

}

.scroll{

margin-top:40px;

font-size:40px;

animation:bounce 2s infinite;

}

@keyframes bounce{

50%{

transform:translateY(12px);

}

}

.btn{

display:inline-block;

margin-top:35px;

padding:16px 40px;

border-radius:50px;

text-decoration:none;

color:white;

font-weight:600;

background:linear-gradient(90deg,#ff4ecd,#9c27ff);

transition:.4s;

}

.btn:hover{

transform:translateY(-5px);

box-shadow:0 15px 30px #ff4ecd55;

} /* Floating Balloons */

/* Glowing Bubbles */

.bubble{
    position:fixed;
    bottom:-120px;
    width:20px;
    height:20px;
    border-radius:50%;
    pointer-events:none;
    z-index:-1;

    background:radial-gradient(circle,
        rgba(255,255,255,.95),
        rgba(255,255,255,.25));

    filter:blur(1px);

    animation:bubbleFloat linear infinite;
}

@keyframes bubbleFloat{

0%{
    transform:translateY(0) scale(.5);
    opacity:0;
}

15%{
    opacity:.9;
}

100%{
    transform:translateY(-120vh) scale(2);
    opacity:0;
}

}

@keyframes sway{
    0%,100%{
        transform:translateX(0) rotate(-3deg);
    }

    50%{
        transform:translateX(15px) rotate(3deg);
    }
}


/* Floating Hearts */

.heart{
position:fixed;
bottom:-50px;
font-size:24px;
animation:heartFloat linear infinite;
pointer-events:none;
z-index:1;
}

@keyframes heartFloat{

0%{
transform:translateY(0) scale(.4);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}

}

/* Mouse Glow */

#mouseGlow{

position:fixed;

width:260px;

height:260px;

border-radius:50%;

background:radial-gradient(circle,
rgba(255,0,180,.25),
transparent 70%);

pointer-events:none;

transform:translate(-50%,-50%);

mix-blend-mode:screen;

z-index:999;

transition:.05s;

}

/* Cursor Trail */

.trail{

position:fixed;

width:10px;

height:10px;

border-radius:50%;

background:#ff66d9;

pointer-events:none;

animation:trailFade .7s linear forwards;

z-index:999;

}

@keyframes trailFade{

to{

transform:scale(3);

opacity:0;

}

}

/* Hero Animation */

.glass{

animation:popIn 1.2s ease;

}

@keyframes popIn{

from{

opacity:0;

transform:translateY(80px) scale(.8);

}

to{

opacity:1;

transform:none;

}

}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<section class="hero">

<div class="glass">

<h2>To Someone Very Special ❤️</h2>

<h1>Happy Birthday Priya</h1>

<p>

Today is all about celebrating your smile, your kindness,

and the happiness you bring into everyone's life.

I hope every dream you have comes true.

You deserve nothing but endless joy.

</p>

<a href="in.html" class="btn">

Open Your Surprise 🎁

</a>

<div class="scroll">

↓

</div>

</div>

<div id="mouseGlow"></div>
 
<script>

// Stars
const stars = document.getElementById("stars");

for(let i=0;i<250;i++){

    let s=document.createElement("div");

    s.className="star";

    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.animationDelay=Math.random()*4+"s";
    s.style.opacity=Math.random();

    stars.appendChild(s);

}

// Balloon Colors
const gradients = [
    "linear-gradient(180deg,#ff6ec7,#ff2d95)",
    "linear-gradient(180deg,#6c63ff,#4f46e5)",
    "linear-gradient(180deg,#4facfe,#00c6ff)",
    "linear-gradient(180deg,#f6d365,#fda085)",
    "linear-gradient(180deg,#43e97b,#38f9d7)",
    "linear-gradient(180deg,#ff9a9e,#fad0c4)"
];


// Create Balloons
// Premium Glowing Bubbles

for(let i=0;i<40;i++){

    const bubble=document.createElement("div");

    bubble.className="bubble";

    bubble.style.left=Math.random()*100+"vw";

    const size=10+Math.random()*35;

    bubble.style.width=size+"px";
    bubble.style.height=size+"px";

    bubble.style.animationDuration=(8+Math.random()*10)+"s";

    bubble.style.animationDelay=Math.random()*8+"s";

    bubble.style.opacity=Math.random();

    document.getElementById("stars").appendChild(bubble);

}
// Floating Hearts

setInterval(()=>{

    let h=document.createElement("div");

    h.className="heart";

    h.innerHTML="❤️";

    h.style.left=Math.random()*100+"vw";

    h.style.animationDuration=(5+Math.random()*4)+"s";

    document.body.appendChild(h);

    setTimeout(()=>{

        h.remove();

    },9000);

},600);


// Mouse Glow

const glow=document.getElementById("mouseGlow");

document.addEventListener("mousemove",(e)=>{

    glow.style.left=e.clientX+"px";

    glow.style.top=e.clientY+"px";

});

// Cursor Trail

document.addEventListener("mousemove",(e)=>{

    let t=document.createElement("div");

    t.className="trail";

    t.style.left=e.clientX+"px";

    t.style.top=e.clientY+"px";

    document.body.appendChild(t);

    setTimeout(()=>{

        t.remove();

    },700);

});
</script>

</body>
</html>
