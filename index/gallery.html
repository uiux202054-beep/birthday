<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<link rel="stylesheet" href="gallery.css">
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;
background:#050714;
overflow-x:hidden;
color:#fff;

}

/* Background */

.background{

position:fixed;
inset:0;
z-index:-5;

background:
radial-gradient(circle at 20% 20%,rgba(255,0,170,.25),transparent 35%),
radial-gradient(circle at 80% 0%,rgba(0,180,255,.18),transparent 40%),
radial-gradient(circle at 50% 100%,rgba(120,0,255,.25),transparent 45%),
#050714;

}

/* Stars */

.stars{

position:fixed;
inset:0;
z-index:-4;

}

.star{

position:absolute;

width:2px;
height:2px;

background:white;

border-radius:50%;

animation:twinkle 3s infinite;

}

@keyframes twinkle{

50%{

opacity:.2;
transform:scale(2);

}

}

/* Header */

header{

padding:80px 20px 50px;

text-align:center;

}

header h1{

font-family:'Great Vibes',cursive;

font-size:70px;

color:#ff84dd;

text-shadow:
0 0 20px #ff4fc4,
0 0 50px #ff4fc4;

}

header p{

margin-top:20px;

font-size:20px;

color:#ddd;

}

/* Gallery */

.gallery{

width:min(1300px,92%);

margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:35px;

padding-bottom:80px;

}

/* Card */

.photo-card{

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

border-radius:24px;

overflow:hidden;

backdrop-filter:blur(18px);

cursor:pointer;

transition:.45s;

box-shadow:

0 15px 40px rgba(0,0,0,.35);

animation:fadeUp 1s both;

}

.photo-card:hover{

transform:
translateY(-12px)
scale(1.04);

box-shadow:

0 0 35px rgba(255,90,200,.5);

}

/* Image */

.photo-card img{

width:100%;

height:340px;

object-fit:cover;

display:block;

transition:.5s;

}

.photo-card:hover img{

transform:scale(1.08);

}

/* Message */

.message{

text-align:center;

padding:70px 20px;

}

.message h2{

font-size:38px;

margin-bottom:20px;

}

.message p{

font-size:20px;

color:#ddd;

margin-bottom:40px;

}

/* Button */

button{

padding:18px 50px;

border:none;

border-radius:50px;

font-size:20px;

background:linear-gradient(135deg,#ff4fc4,#8b5cf6);

color:white;

cursor:pointer;

transition:.4s;

}

button:hover{

transform:scale(1.08);

box-shadow:

0 0 30px #ff4fc4;

}

/* Viewer */

#viewer{

position:fixed;

inset:0;

background:rgba(0,0,0,.92);

display:flex;

justify-content:center;

align-items:center;

opacity:0;

visibility:hidden;

transition:.4s;

z-index:99999;

}

#viewer.show{

opacity:1;

visibility:visible;

}

#viewer img{

max-width:90%;

max-height:90%;

border-radius:20px;

box-shadow:

0 0 50px rgba(255,255,255,.25);

animation:zoom .4s;

}

#close{

position:absolute;

top:30px;

right:45px;

font-size:55px;

cursor:pointer;

}

/* Hearts */

.heart{

position:fixed;

bottom:-50px;

font-size:22px;

opacity:.25;

pointer-events:none;

animation:heartFloat linear forwards;

}

@keyframes heartFloat{

0%{

transform:translateY(0) scale(.5);

opacity:0;

}

20%{

opacity:.25;

}

100%{

transform:translateY(-120vh) scale(1.6);

opacity:0;

}

}

/* Fade */

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:none;

}

}

@keyframes zoom{

from{

transform:scale(.8);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}

@media(max-width:768px){

header h1{

font-size:48px;

}

.photo-card img{

height:260px;

}

.message h2{

font-size:28px;

}

}
</style>
</head>

<body>

<div class="background"></div>

<div id="stars" class="stars"></div>

<div id="hearts"></div>

<header>

<h1>Our Beautiful Memories ❤️</h1>

<p>
Every picture reminds me how lucky I am to have you.
</p>

</header>

<section class="gallery">

<div class="photo-card">
<img src="1.jpg" alt="">
</div>

<div class="photo-card">
<img src="2.jpg" alt="">
</div>

<div class="photo-card">
<img src="3.jpg" alt="">
</div>

<div class="photo-card">
<img src="4.jpg" alt="">
</div>

<div class="photo-card">
<img src="5.jpg" alt="">
</div>

<div class="photo-card">
<img src="6.jpg" alt="">
</div>

<div class="photo-card">
<img src="7.jpg" alt="">
</div>

<div class="photo-card">
<img src="8.jpg" alt="">
</div>

</section>

<div class="message">

<h2>
Every memory with you is my favourite memory.
</h2>

<p>
Thank you for making my life beautiful.
</p>

<button>

mine girll ❤️

</button>

</div>

<!-- Fullscreen Viewer -->

<div id="viewer">

<span id="close">&times;</span>

<img id="viewerImg">

</div>

<script>
    // ===============================
// Create Stars
// ===============================

const stars = document.getElementById("stars");

for(let i=0;i<180;i++){

    const star=document.createElement("div");

    star.className="star";

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";

    const size=Math.random()*3+1;

    star.style.width=size+"px";
    star.style.height=size+"px";

    star.style.animationDelay=Math.random()*3+"s";

    stars.appendChild(star);

}

// ===============================
// Floating Hearts
// ===============================

function createHeart(){

    const heart=document.createElement("div");

    heart.className="heart";

    heart.innerHTML="❤";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(18+Math.random()*20)+"px";

    heart.style.animationDuration=(6+Math.random()*4)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },10000);

}

setInterval(createHeart,500);

// ===============================
// Photo Animation Delay
// ===============================

const cards=document.querySelectorAll(".photo-card");

cards.forEach((card,index)=>{

    card.style.animationDelay=(index*0.15)+"s";

});

// ===============================
// Fullscreen Viewer
// ===============================

const viewer=document.getElementById("viewer");
const viewerImg=document.getElementById("viewerImg");
const close=document.getElementById("close");

cards.forEach(card=>{

    card.addEventListener("click",()=>{

        const img=card.querySelector("img");

        viewerImg.src=img.src;

        viewer.classList.add("show");

        document.body.style.overflow="hidden";

    });

});

// ===============================
// Close Viewer
// ===============================

close.onclick=()=>{

    viewer.classList.remove("show");

    document.body.style.overflow="auto";

};

// Click outside image

viewer.addEventListener("click",(e)=>{

    if(e.target===viewer){

        viewer.classList.remove("show");

        document.body.style.overflow="auto";

    }

});

// ESC Key

document.addEventListener("keydown",(e)=>{

    if(e.key==="Escape"){

        viewer.classList.remove("show");

        document.body.style.overflow="auto";

    }

});

// ===============================
// Continue Button
// ===============================

document.getElementById("nextBtn").addEventListener("click",()=>{

    document.body.style.transition=".8s";

    document.body.style.opacity="0";

    setTimeout(()=>{

        window.location.href="letter.html";

    },800);

});

// ===============================
// Parallax Effect
// ===============================

document.addEventListener("mousemove",(e)=>{

    const x=(e.clientX/window.innerWidth-.5)*20;
    const y=(e.clientY/window.innerHeight-.5)*20;

    document.querySelector(".background").style.transform=
    `translate(${x}px,${y}px)`;

});
</script>

</body>

</html>
